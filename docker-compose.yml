version: '3.8'

services:
  app:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    environment:
      - CASCABEL_API_HOST=0.0.0.0
      - CASCABEL_AGENT_HOST=target-linux
    depends_on:
      - target-linux

  target-linux:
    image: python:3.14-slim
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - PYTHONPATH=/app
      - CASCABEL_AGENT_BIND=0.0.0.0
    command: python -m target.agent
