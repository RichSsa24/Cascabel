version: '3.8'

services:
  app:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
      - ./ledger.jsonl:/app/ledger.jsonl
      - ./telemetry.db:/app/telemetry.db
      - ./scope.yaml:/app/scope.yaml
      - ./cascabel.pub:/app/cascabel.pub
      - ./cascabel.key:/app/cascabel.key
    environment:
      - CASCABEL_API_HOST=0.0.0.0
      - CASCABEL_AGENT_HOST=target-linux
    depends_on:
      - target-linux

  target-linux:
    image: python:3.14-slim
    volumes:
      - ./target:/app/target
      - ./cascabel:/app/cascabel
    working_dir: /app
    environment:
      - PYTHONPATH=/app
      - CASCABEL_AGENT_BIND=0.0.0.0
    command: python -m target.agent
